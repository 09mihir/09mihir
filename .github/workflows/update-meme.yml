name: Update Meme

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch meme and update README
        run: |
          MEME_URL=$(curl -s https://git-meme.vercel.app/api/memes/random | python3 -c "import sys,json; print(json.load(sys.stdin)['imageUrl'])")
          sed -i "s|<!-- MEME -->.*<!-- /MEME -->|<!-- MEME --><img src=\"$MEME_URL\" alt=\"Programming Meme\" width=\"500\" /><!-- /MEME -->|" README.md

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "🤖 fresh meme [skip ci]" && git push)
